id: WI-0002-idea-backlog
title: "Idea Backlog Web App — standalone HTML/CSS/JS"
type: feature
owner: "internal-cockpit"
status: ready

objective: "Build a standalone web app (single HTML file or HTML+CSS+JS) for capturing and prioritizing ideas. App must open in the browser, allow add/remove/prioritize ideas, and persist data in localStorage."
context: "PoC to validate the cockpit build lane. The app will be generated by the build lane provider and validated by the QA lane with Playwright."
constraints:
  - "Standalone files only — no build step, no npm, no bundler"
  - "Must work when opened directly in a browser (file:// or localhost)"
  - "Persist data in localStorage"
success_criteria:
  - "index.html opens in browser without errors"
  - "User can add an idea with title and priority"
  - "User can remove an idea"
  - "Ideas persist after page reload"
  - "UI has at least: input field, add button, idea list, priority selector"
non_goals:
  - "Backend or database"
  - "Authentication"
  - "Multi-user support"

source_repo:
  path: "C:/Users/guibr/vibe-workbook"
  branch: "main"
  related_issues: []

delivery_expectations:
  required_artifacts:
    - produced_artifact
    - evidence
    - next_step
  release_target: "poc/idea-backlog"
  reviewer: "human operator"

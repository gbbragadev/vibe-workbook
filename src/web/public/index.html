<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Workbook</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <h1>Vibe Workbook</h1>
      <p>Multi-agent workspace for vibe coding</p>
      <input type="password" id="login-password" placeholder="Password" autofocus data-testid="login-password">
      <button id="login-btn" data-testid="login-submit">Login</button>
      <div id="login-error" class="hidden"></div>
    </div>
  </div>

  <div id="app" class="hidden" data-testid="app-layout">
    <header id="header">
      <div class="header-left">
        <button class="btn btn-sm sidebar-toggle" id="btn-sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">☰</button>
        <span class="logo">Vibe Workbook</span>
        <span class="header-stats" id="header-stats"></span>
      </div>
      <div class="header-right">
        <button class="btn btn-sm btn-primary" id="btn-products" title="Products" data-testid="nav-products">Products</button>
        <button class="btn btn-sm" id="btn-ideas" title="Idea discovery pipeline" data-testid="nav-ideas">Ideas</button>
        <button class="btn btn-sm" id="btn-terminals" title="Terminal sessions" data-testid="nav-terminals">Terminals</button>
        <div class="nav-more-container">
          <button class="btn btn-sm" id="btn-more" title="More views" data-testid="nav-more">More &#9662;</button>
          <div id="nav-more-dropdown" class="nav-more-dropdown hidden" data-testid="nav-more-dropdown">
            <button class="btn btn-sm" id="btn-history" data-testid="nav-history">History</button>
            <button class="btn btn-sm" id="btn-discover" data-testid="nav-discover">Discover</button>
            <button class="btn btn-sm" id="btn-cost-dashboard" data-testid="nav-costs">Costs</button>
          </div>
        </div>
        <select id="theme-select" title="Visual theme">
          <option value="dark">Midnight Indigo</option>
          <option value="teal">Teal Signal</option>
          <option value="ember">Ember Ops</option>
        </select>
        <select id="agent-filter" title="Filter by agent">
          <option value="">All Agents</option>
          <option value="claude">Claude Code</option>
          <option value="codex">Codex CLI</option>
          <option value="gemini">Gemini CLI</option>
        </select>
      </div>
    </header>

    <div id="main-layout">
      <aside id="sidebar">
        <div class="sidebar-section sidebar-products-section">
          <div class="sidebar-section-header">
            <h3>Products</h3>
          </div>
          <div id="sidebar-product-list"></div>
        </div>
        <div class="sidebar-section sidebar-workspaces-section">
          <div class="sidebar-section-header">
            <h3>Runtime Workspaces</h3>
            <button class="btn btn-sm btn-primary" id="btn-new-workspace" title="New runtime workspace">+</button>
          </div>
          <div id="workspace-list"></div>
        </div>
        <div class="sidebar-footer">
          <input type="text" id="search-input" placeholder="Search...">
        </div>
      </aside>

      <main id="content">
        <div id="view-products" class="view active">
          <div class="products-page">
            <section class="products-overview-panel">
              <div class="products-header">
                <div>
                  <h2>Products</h2>
                  <p id="products-summary" class="products-summary"></p>
                </div>
                <button class="btn btn-sm btn-primary" id="btn-new-product" title="Create product">+ Product</button>
              </div>
              <div id="products-overview"></div>
            </section>
            <section id="product-detail" class="product-detail-panel"></section>
            <section id="product-terminal" class="product-terminal-panel hidden"></section>
          </div>
        </div>

        <div id="view-terminals" class="view">
          <div class="view-toolbar">
            <div class="toolbar-left">
              <span id="active-workspace-name">Select a runtime workspace</span>
            </div>
            <div class="toolbar-right">
              <button class="btn btn-sm btn-primary" id="btn-new-session">+ Session</button>
              <button class="btn btn-sm" id="btn-stop-all-sessions" title="Stop all sessions in this runtime workspace">Stop All</button>
              <button class="btn btn-sm" id="btn-layout-1" title="Single pane">1</button>
              <button class="btn btn-sm" id="btn-layout-2" title="Split vertical">2</button>
              <button class="btn btn-sm" id="btn-layout-4" title="Grid 2x2">4</button>
            </div>
          </div>
          <div id="terminal-grid"></div>
        </div>

        <div id="view-costs" class="view">
          <div class="cost-header">
            <h2>Cost Dashboard</h2>
          </div>
          <div id="cost-content"></div>
        </div>

        <div id="view-history" class="view">
          <div class="history-header">
            <h2>Session History</h2>
          </div>
          <div id="history-content"></div>
        </div>

        <div id="view-discover" class="view">
          <div class="discover-header">
            <h2>Discovered Sessions</h2>
            <button class="btn btn-sm btn-primary" id="btn-run-discover">Scan</button>
          </div>
          <div id="discover-content"></div>
        </div>

        <div id="view-ideas" class="view">
          <div class="ideas-page">
            <section class="ideas-overview-panel">
              <div class="ideas-header">
                <div>
                  <h2 data-testid="ideas-heading">Ideas</h2>
                  <p id="ideas-summary" class="products-summary"></p>
                </div>
                <div class="ideas-header-actions">
                  <button class="btn btn-sm btn-primary" id="btn-start-discovery" data-testid="action-start-discovery">Discover</button>
                  <button class="btn btn-sm" id="btn-deduplicate-ideas" data-testid="action-deduplicate">Deduplicate</button>
                  <button class="btn btn-sm" id="btn-new-idea" data-testid="action-new-idea">+ Idea</button>
                </div>
              </div>
              <div id="ideas-discovery-bar" class="hidden"></div>
              <div id="ideas-filters"></div>
              <div id="ideas-overview"></div>
            </section>
            <section id="idea-detail" class="product-detail-panel"></section>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="dialog-overlay" class="hidden" data-testid="dialog-overlay">
    <div id="dialog-box" data-testid="dialog-box">
      <h3 id="dialog-title" data-testid="dialog-title"></h3>
      <div id="dialog-body" data-testid="dialog-body"></div>
      <div id="dialog-actions" data-testid="dialog-actions"></div>
    </div>
  </div>

  <div id="context-menu" class="hidden"></div>

  <script src="/app-core.js"></script>
  <script src="/app-orchestrated.js"></script>
</body>
</html>
